<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="見える時計" />

  <title>見える時計</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="second-layer" id="secondLayer" aria-hidden="true"></div>

  <main class="clock" id="clock">
    <section class="ring" aria-label="この1時間の進み具合">
      <div class="ring-visual" id="hourRing" aria-hidden="true"></div>

      <div class="center">
        <div class="time" id="time">00:00</div>
        <div class="seconds" id="seconds">00秒</div>
        <div class="caption">この1時間の進み具合</div>
      </div>
    </section>

    <section class="day">
      <div class="day-head">
        <span>今日の進み具合</span>
        <span id="dayPercent">0%</span>
      </div>
      <div class="day-bar" aria-hidden="true">
        <div class="day-fill" id="dayFill"></div>
      </div>
      <div class="date" id="date">0000年0月0日</div>
    </section>
  </main>

  <div class="controls" id="controls">
    <button class="icon-button" id="settingsButton" type="button" aria-label="色の設定を開く">⚙</button>
  </div>

  <aside class="panel" id="panel" aria-label="色の設定">
    <div class="panel-title">色の設定</div>

    <label class="row">
      <span>背景</span>
      <input id="bgColor" type="color" />
    </label>

    <label class="row">
      <span>せり上がり</span>
      <input id="riseColor" type="color" />
    </label>

    <label class="row">
      <span>せり上がり濃さ</span>
      <input id="riseOpacity" type="range" min="0" max="45" step="1" />
    </label>

    <label class="row">
      <span>文字</span>
      <input id="textColor" type="color" />
    </label>

    <label class="row">
      <span>円・バー</span>
      <input id="accentColor" type="color" />
    </label>

    <button class="reset" id="resetButton" type="button">初期色に戻す</button>
  </aside>

  <script src="./script.js" defer></script>
</body>
</html>
